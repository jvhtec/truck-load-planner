name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build Preview
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /truck-load-planner/pr-${{ github.event.number }}/
        run: npm run build
      
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ github.event.number }}
          path: dist/

      - name: Deploy to gh-pages branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Fetch gh-pages branch
          git fetch origin gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages 2>/dev/null || git checkout -b gh-pages
          git reset --hard origin/gh-pages 2>/dev/null || true
          
          # Remove old preview for this PR
          rm -rf pr-${{ github.event.number }}
          
          # Copy new build
          cp -r dist pr-${{ github.event.number }}
          
          # Add index redirect at root
          if [ ! -f index.html ]; then
            cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>Truck Load Planner</title></head>
          <body>
          <h1>Truck Load Planner</h1>
          <p><a href="https://jvhtec.github.io/truck-load-planner/">Main Site</a></p>
          </body>
          </html>
          EOF
          fi
          
          git add .
          git commit -m "Deploy PR #${{ github.event.number }} preview" || echo "No changes"
          git push origin gh-pages --force
      
      - name: Comment PR with Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = `https://jvhtec.github.io/truck-load-planner/pr-${{ github.event.number }}/`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🚀 Preview Deployment\n\n**URL:** [${previewUrl}](${previewUrl})\n\n_This preview was deployed from commit \`${{ github.sha }}\`_\n\n---\n_Preview deployments are automatically updated on each push to this PR._`
            });

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Remove preview
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          
          rm -rf pr-${{ github.event.number }}
          git add .
          git commit -m "Remove PR #${{ github.event.number }} preview" || echo "No changes"
          git push origin gh-pages
      
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🧹 Preview Removed\n\nThe preview deployment for this PR has been removed.`
            });
