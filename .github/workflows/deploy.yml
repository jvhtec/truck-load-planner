name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Stamp deploy metadata
        run: |
          cat > dist/deploy-info.json << EOF
          {
            "sha": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "deployed_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to GitHub Pages
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # Save the new build outside the workspace before switching branches
          cp -r dist /tmp/new-dist

          # Check out (or initialize) the gh-pages branch
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Clean root-level files but preserve PR preview directories (pr-N/)
          # This ensures stale JS/CSS bundles don't linger and serve cached old builds
          find . -maxdepth 1 \
            ! -name '.' \
            ! -name '.git' \
            ! -path './pr-*' \
            -exec rm -rf {} +

          # Copy the new build into the root
          cp -r /tmp/new-dist/. .

          git add .
          git diff --staged --quiet || git commit -m "Deploy ${{ github.sha }}"
          git push origin gh-pages
